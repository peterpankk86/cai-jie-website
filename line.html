<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>采杰時尚美學中心｜CAI JIE BEAUTY</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:
      "Noto Serif TC",
      "PingFang TC",
      serif;

      background:#ede7df;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      display:block;
      width:100%;
    }

    .hero{
      width:100%;
      overflow:hidden;
      background:#111;
    }

    .hero img{
      width:100%;
      height:auto;
      display:block;
    }

    .menu-section{
      padding:22px 14px 30px;
      background:#ede7df;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      max-width:1100px;
      margin:auto;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:22px;

      background:#ddd4ca;

      transition:0.35s;

      box-shadow:
      0 8px 22px rgba(0,0,0,0.06);
    }

    .card:hover{
      transform:
      translateY(-4px)
      scale(1.01);
    }

    .card img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      transition:0.4s;
    }

    .card:hover img{
      transform:scale(1.03);
    }

    .footer-space{
      height:18px;
    }

    @media(max-width:900px){

      .menu-section{
        padding:16px 10px 24px;
      }

      .menu-grid{
        grid-template-columns:1fr 1fr 1fr;
        gap:8px;
      }

      .card{
        border-radius:18px;
      }

    }

    @media(max-width:640px){

      .menu-grid{
        grid-template-columns:1fr 1fr 1fr;
        gap:6px;
      }

      .card{
        border-radius:14px;
      }

    }

  </style>
</head>

<body>

  <!-- HERO -->

  <section class="hero">

    <img src="linehome01A.webp">

  </section>

  <!-- MENU -->

  <section class="menu-section">

    <div class="menu-grid">

      <!-- 療程方案 -->

      <a href="#">

        <div class="card">
          <img src="bottom01A.webp">
        </div>

      </a>

      <!-- 多堂方案 -->

      <a href="#">

        <div class="card">
          <img src="bottom03A.webp">
        </div>

      </a>

      <!-- 專業師資 -->

      <a href="#">

        <div class="card">
          <img src="bottom04A.webp">
        </div>

      </a>

      <!-- 環境介紹 -->

      <a href="#">

        <div class="card">
          <img src="bottom05A.webp">
        </div>

      </a>

      <!-- 地理位置 -->

      <a href="#">

        <div class="card">
          <img src="bottom06A.webp">
        </div>

      </a>

      <!-- 實際案例 -->

      <a href="#">

        <div class="card">
          <img src="bottom02A.webp">
        </div>

      </a>

    </div>

  </section>

  <div class="footer-space"></div>

</body>

</html>
